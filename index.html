<!DOCTYPE html>
<html>
<head>
  <title>Kaizen Knight</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kaizen Knight">
  <meta name="theme-color" content="#222222">

  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" href="icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      height:100vh;
      background:#222;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:'VT323', monospace;
      overflow:hidden;
      -webkit-user-select:none;
      user-select:none;
      touch-action:manipulation;
    }

    .device{
      width:min(92vw, 420px);
      height:min(86vh, 740px);
      background:#d8d0b0;
      border:6px solid #111;
      border-radius:24px;
      padding:24px;
      box-sizing:border-box;
      box-shadow:0 8px 0 #111;
    }

    .screen{
      width:100%;
      height:68%;
      background:#e9ecd8;
      border:5px solid #111;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      box-sizing:border-box;
    }

    .screen.off,
    .screen.boot-dark{ background:#111; }

    .status-bar{
      height:38px;
      border-bottom:4px solid #111;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:24px;
      letter-spacing:2px;
      flex-shrink:0;
    }

    .off .status-bar,
    .boot-dark .status-bar{
      color:#e9ecd8;
      border-bottom:4px solid #e9ecd8;
    }

    .play-area{
      flex:1;
      min-height:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      box-sizing:border-box;
      overflow:hidden;
    }

    .power-btn{
      background:#e9ecd8;
      color:#111;
      border:4px solid #e9ecd8;
      font-family:'VT323', monospace;
      font-size:34px;
      padding:8px 22px;
      box-shadow:none;
    }

    .boot-text{
      color:#e9ecd8;
      font-size:32px;
      letter-spacing:2px;
      animation:bootPulse .8s infinite steps(2);
    }

    @keyframes bootPulse{
      0%{opacity:1}
      50%{opacity:.35}
      100%{opacity:1}
    }

    .pet-zone{
      width:240px;
      height:130px;
      position:relative;
      margin-bottom:-10px;
    }

    .pet-walker{
      position:absolute;
      left:50%;
      bottom:28px;
      transform:translateX(-50%);
    }

    .pet-bob{ animation:bob 1.2s infinite steps(2); }

    .pet-img{
      width:160px;
      height:160px;
      display:block;
      image-rendering:pixelated;
      image-rendering:crisp-edges;
      object-fit:contain;
      opacity:.92;
      filter:grayscale(1) contrast(2) brightness(.55);
    }

    .pet-walker.right .pet-img{ transform:scaleX(-1); }
    .pet-walker.left .pet-img{ transform:scaleX(1); }

    @keyframes bob{
      0%{transform:translateY(0)}
      50%{transform:translateY(-4px)}
      100%{transform:translateY(0)}
    }

    .ground{
      width:100px;
      border-bottom:4px solid #111;
      margin-bottom:14px;
    }

    .textbox{
      width:100%;
      background:#f8f8f8;
      border-top:4px solid #111;
      padding:9px;
      box-sizing:border-box;
      text-align:center;
      font-size:24px;
      line-height:1.03;
    }

    .subline{
      font-size:20px;
      opacity:.9;
    }

    .panel{
      width:100%;
      height:100%;
      min-height:0;
      display:flex;
      flex-direction:column;
      background:#f8f8f8;
    }

    .panel-title{
      text-align:center;
      font-size:25px;
      padding:5px;
      border-bottom:4px solid #111;
      flex-shrink:0;
    }

    .scroll{
      flex:1;
      min-height:0;
      overflow-y:auto;
      padding:8px 10px;
      box-sizing:border-box;
    }

    .section-label{
      font-size:23px;
      margin:8px 0 5px;
      border-bottom:3px solid #111;
      letter-spacing:1px;
    }

    .rule{
      display:flex;
      align-items:flex-start;
      gap:8px;
      margin-bottom:6px;
      font-size:22px;
      line-height:.95;
    }

    .box{
      width:15px;
      height:15px;
      border:3px solid #111;
      background:#f8f8f8;
      flex-shrink:0;
      cursor:pointer;
      margin-top:1px;
    }

    .box.checked{ background:#111; }

    .note{
      font-size:22px;
      line-height:1.0;
      margin-bottom:10px;
      padding-bottom:8px;
      border-bottom:2px dotted #111;
    }

    .small-note{
      font-size:19px;
      line-height:.95;
      opacity:.85;
      margin:4px 0 8px;
      text-align:center;
    }

    .panel-buttons{
      border-top:4px solid #111;
      padding:6px;
      display:flex;
      gap:8px;
      flex-shrink:0;
      background:#f8f8f8;
    }

    .mini-btn{
      flex:1;
      height:36px;
      background:#111;
      color:white;
      border:none;
      font-family:'VT323', monospace;
      font-size:24px;
      cursor:pointer;
    }

    .week-row{
      margin-top:18px;
      display:flex;
      justify-content:space-between;
      gap:5px;
    }

    .day{
      flex:1;
      height:34px;
      border:3px solid #111;
      background:#f8f8f8;
      font-size:20px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .day.complete{
      background:#111;
      color:white;
    }

    .day.failed{
      text-decoration:line-through;
    }

    .day.today{
      outline:3px solid #111;
    }

    .day.inactive{
      opacity:.35;
    }

    .buttons{
      margin-top:22px;
      display:flex;
      justify-content:space-between;
      gap:8px;
    }

    button{
      flex:1;
      height:48px;
      background:#111;
      color:white;
      border:none;
      font-family:'VT323', monospace;
      font-size:24px;
      box-shadow:0 4px 0 #333;
      cursor:pointer;
    }

    button:active{
      transform:translateY(3px);
      box-shadow:0 1px 0 #333;
    }
  </style>
</head>

<body>

<div class="device">

  <div class="screen off" id="screen">
    <div class="status-bar" id="statusBar">POWER OFF</div>
    <div class="play-area" id="playArea">
      <button class="power-btn" onclick="powerOn()">POWER</button>
    </div>
  </div>

  <div class="week-row">
    <div class="day" id="day0">MON</div>
    <div class="day" id="day1">TUE</div>
    <div class="day" id="day2">WED</div>
    <div class="day" id="day3">THU</div>
    <div class="day" id="day4">FRI</div>
  </div>

  <div class="buttons">
    <button onclick="showCheck()">CHECK</button>
    <button onclick="showCode()">CODE</button>
    <button onclick="resetWeek()">RESET</button>
  </div>

</div>

<script>
const vows=[
  "MAX CONTRACTS 5",
  "LOCK RISK SETTINGS",
  "RECORD EVERY SESSION",
  "DON'T TRADE OUTSIDE ROUTINE",
  "DON'T SIZE UP AFTER A LOSS",
  "JOURNAL BOTH ACCOUNTS",
  "DON'T GET EMOTIONAL"
];

const damageStates=[
  "TRADED OVER 5 CONTRACTS",
  "RISK SETTINGS NOT LOCKED",
  "UNRECORDED SESSION",
  "TRADED OUTSIDE ROUTINE",
  "SIZED UP AFTER A LOSS",
  "SECOND ACCOUNT TRADED AFTER FIRST STOP",
  "JOURNAL ABANDONED",
  "SPIRALED AFTER LOSS",
  "BOUGHT / RESET COMBINE"
];

const codeNotes=[
  "CONSIDER STOPPING AT -250.",
  "DON'T TRADE SECOND ACCOUNT IF FIRST ACCOUNT IS STOPPED OUT.",
  "CAREFUL FOR MANIPULATION, KNIVES, SUDDEN REVERSALS, AND PRICE COMING CLOSE TO YOUR STOP.",
  "DON'T RELY ON STOPS. STAY ALERT!",
  "SLOWER IS QUICKER AFTER A LOSS.",
  "A GOOD DAY MEANS INTEGRITY WAS PRESERVED.",
  "TRADING DOES NOT END WHEN TOPSTEP CLOSES. PROTECT THE REST OF THE DAY."
];

const days=["MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY"];

let todayIndex=getTradingDayIndex();
let weekKey=getWeekKey();
let state=loadState();

let moveTimer=null;
let blinkTimer=null;
let petStep=0;
let poweredOn=false;

const petPositions=[50,40,32,32,44,58,66,66,54,50];
const sounds={};

function makeToneWav(freq=440,duration=.1,volume=.7){
  const sampleRate=22050;
  const samples=Math.floor(sampleRate*duration);
  const dataSize=samples*2;
  const buffer=new ArrayBuffer(44+dataSize);
  const view=new DataView(buffer);

  function writeString(offset,string){
    for(let i=0;i<string.length;i++){
      view.setUint8(offset+i,string.charCodeAt(i));
    }
  }

  writeString(0,"RIFF");
  view.setUint32(4,36+dataSize,true);
  writeString(8,"WAVE");
  writeString(12,"fmt ");
  view.setUint32(16,16,true);
  view.setUint16(20,1,true);
  view.setUint16(22,1,true);
  view.setUint32(24,sampleRate,true);
  view.setUint32(28,sampleRate*2,true);
  view.setUint16(32,2,true);
  view.setUint16(34,16,true);
  writeString(36,"data");
  view.setUint32(40,dataSize,true);

  for(let i=0;i<samples;i++){
    const t=i/sampleRate;
    const square=Math.sin(2*Math.PI*freq*t)>=0?1:-1;
    const fadeOut=1-(i/samples);
    const fadeIn=Math.min(1,i/(sampleRate*.01));
    const env=fadeOut*fadeIn;
    const sample=square*volume*env*32767;
    view.setInt16(44+i*2,sample,true);
  }

  let binary="";
  const bytes=new Uint8Array(buffer);
  const chunkSize=8192;

  for(let i=0;i<bytes.length;i+=chunkSize){
    const chunk=bytes.subarray(i,i+chunkSize);
    binary+=String.fromCharCode.apply(null,chunk);
  }

  return "data:audio/wav;base64,"+btoa(binary);
}

function buildSounds(){
  sounds.power=new Audio(makeToneWav(130,.08,.8));
  sounds.menu=new Audio(makeToneWav(500,.09,.75));
  sounds.tick=new Audio(makeToneWav(720,.045,.7));
  sounds.fail=new Audio(makeToneWav(170,.26,.8));
  sounds.reset=new Audio(makeToneWav(220,.18,.75));

  sounds.boot1=new Audio(makeToneWav(196,.09,.85));
  sounds.boot2=new Audio(makeToneWav(294,.10,.85));
  sounds.boot3=new Audio(makeToneWav(392,.11,.85));
  sounds.boot4=new Audio(makeToneWav(523,.15,.9));

  sounds.victory1=new Audio(makeToneWav(523,.13,.8));
  sounds.victory2=new Audio(makeToneWav(659,.13,.8));
  sounds.victory3=new Audio(makeToneWav(784,.24,.85));

  for(const key in sounds){
    sounds[key].preload="auto";
    sounds[key].playsInline=true;
  }
}

function playSound(name){
  if(!sounds[name]) return;
  const s=sounds[name].cloneNode();
  s.volume=1;
  s.play().catch(()=>{});
}

function playBoot(){
  playSound("power");
  setTimeout(()=>playSound("boot1"),90);
  setTimeout(()=>playSound("boot2"),210);
  setTimeout(()=>playSound("boot3"),340);
  setTimeout(()=>playSound("boot4"),500);
}

function playMenu(){ playSound("menu"); }
function playTick(){ playSound("tick"); }
function playFailure(){ playSound("fail"); }
function playReset(){ playSound("reset"); }

function playVictory(){
  playSound("victory1");
  setTimeout(()=>playSound("victory2"),150);
  setTimeout(()=>playSound("victory3"),300);
}

function getTradingDayIndex(){
  let d=new Date().getDay();
  if(d===0 || d===6) return -1;
  return d-1;
}

function getWeekKey(){
  let now=new Date();
  let day=now.getDay();
  let diff=now.getDate()-day+(day===0?-6:1);
  let monday=new Date(now.setDate(diff));
  return monday.toISOString().slice(0,10);
}

function freshState(){
  return{
    weekKey:weekKey,
    statuses:["inactive","inactive","inactive","inactive","inactive"],
    vows:Array.from({length:5},()=>Array(vows.length).fill(false)),
    damage:Array.from({length:5},()=>Array(damageStates.length).fill(false))
  };
}

function loadState(){
  let saved=localStorage.getItem("kaizenKnightV3");
  if(!saved) return freshState();

  try{
    let parsed=JSON.parse(saved);
    if(parsed.weekKey!==weekKey) return freshState();

    if(!parsed.vows || parsed.vows[0].length!==vows.length) return freshState();
    if(!parsed.damage || parsed.damage[0].length!==damageStates.length) return freshState();

    return parsed;
  }catch(e){
    return freshState();
  }
}

function saveState(){
  localStorage.setItem("kaizenKnightV3",JSON.stringify(state));
}

function powerOn(){
  if(poweredOn) return;
  poweredOn=true;
  playBoot();
  showBoot();
}

function renderDays(){
  for(let i=0;i<5;i++){
    let el=document.getElementById("day"+i);
    el.className="day";

    if(state.statuses[i]==="complete") el.classList.add("complete");
    if(state.statuses[i]==="failed") el.classList.add("failed");
    if(state.statuses[i]==="inactive") el.classList.add("inactive");
    if(i===todayIndex) el.classList.add("today");
  }
}

function cleanCount(){
  return state.statuses.filter(s=>s==="complete").length;
}

function failedCount(){
  return state.statuses.filter(s=>s==="failed").length;
}

function allVowsKept(dayIndex){
  return state.vows[dayIndex].every(Boolean);
}

function perfectWeek(){
  return cleanCount()===5 && failedCount()===0;
}

function getPetImage(type){
  if(type==="king") return "king.png";
  if(type==="rook") return "rook.png";
  if(type==="angel") return "angel.png";
  return "knight.png";
}

function petHTML(type="knight"){
  const src=getPetImage(type);
  const canBlink=type==="knight";

  return `
    <div class="pet-zone">
      <div class="pet-walker left" id="petWalker">
        <div class="pet-bob">
          <img class="pet-img" id="petImg"
               src="${src}"
               data-pet-type="${type}"
               data-can-blink="${canBlink}"
               alt="Kaizen Knight">
        </div>
      </div>
    </div>
  `;
}

function stopPet(){
  clearInterval(moveTimer);
  clearInterval(blinkTimer);
}

function startBlink(){
  // Blink is synced to the movement cycle inside startPet().
  // No independent blink timer is used.
}

function startPet(delay=0){
  stopPet();

  setTimeout(()=>{
    const walker=document.getElementById("petWalker");
    const pet=document.getElementById("petImg");
    if(!walker || !pet) return;

    petStep=0;
    walker.style.left=petPositions[petStep]+"%";
    pet.src=getPetImage(pet.dataset.petType);

    moveTimer=setInterval(()=>{
      const current=petPositions[petStep];
      petStep=(petStep+1)%petPositions.length;
      const next=petPositions[petStep];

      if(next>current){
        walker.className="pet-walker right";
        pet.src=getPetImage(pet.dataset.petType);
      }else if(next<current){
        walker.className="pet-walker left";
        pet.src=getPetImage(pet.dataset.petType);
      }else{
        if(pet.dataset.canBlink==="true"){
          pet.src="blink.png";
        }
      }

      walker.style.left=next+"%";
    },1200);

  },delay);
}

function showBoot(){
  stopPet();
  renderDays();

  document.getElementById("screen").className="screen boot-dark";
  document.getElementById("statusBar").innerHTML="POWER";
  document.getElementById("playArea").innerHTML="<div class='boot-text'>BOOTING...</div>";

  setTimeout(()=>{
    document.getElementById("statusBar").innerHTML="KAIZEN KNIGHT";
  },650);

  setTimeout(()=>{
    document.getElementById("screen").className="screen";
    showMain(true);
  },1200);
}

function currentDayText(){
  let now=new Date();

  let timeString=now.toLocaleTimeString([],{
    hour:'2-digit',
    minute:'2-digit'
  });

  let dateString=now.toLocaleDateString([],{
    month:'short',
    day:'numeric'
  });

  return {dateString,timeString};
}

function showMain(fromBoot=false){
  if(!poweredOn) return;

  stopPet();
  renderDays();

  document.getElementById("screen").className="screen";
  document.getElementById("statusBar").innerHTML="KAIZEN KNIGHT";

  let dt=currentDayText();

  if(todayIndex<0){
    document.getElementById("playArea").innerHTML=
      petHTML("knight")+
      "<div class='ground'></div>"+
      "<div class='textbox'>"+
      dt.dateString+" • "+dt.timeString+
      "<br>WEEKEND / REST DAY"+
      "<br><span class='subline'>CLEAN DAYS: "+cleanCount()+"/5</span>"+
      "</div>";

    startPet(fromBoot ? 650 : 0);
    return;
  }

  let status=state.statuses[todayIndex];
  let text="STEADY";
  let petType="knight";

  if(status==="complete"){
    text="DAY SEALED CLEAN";
    petType=perfectWeek() ? "angel" : "king";
  }

  if(status==="failed"){
    text="INTEGRITY DAMAGED";
    petType="rook";
  }

  document.getElementById("playArea").innerHTML=
    petHTML(petType)+
    "<div class='ground'></div>"+
    "<div class='textbox'>"+
    dt.dateString+" • "+days[todayIndex]+
    "<br>STATUS: "+text+
    "<br><span class='subline'>CLEAN DAYS: "+cleanCount()+"/5</span>"+
    "</div>";

  startPet(fromBoot ? 650 : 0);
}

function showCheck(){
  if(!poweredOn) return;

  stopPet();

  if(todayIndex<0){
    showMain();
    return;
  }

  playMenu();

  let html="";
  html+="<div class='panel'>";
  html+="<div class='panel-title'>CHECK</div>";
  html+="<div class='scroll' id='checkScroll'>";

  html+="<div class='section-label'>VOWS</div>";
  html+="<div class='small-note'>CHECK WHAT HELD TRUE TODAY</div>";

  for(let i=0;i<vows.length;i++){
    html+="<div class='rule'>";
    html+="<div class='box "+(state.vows[todayIndex][i]?"checked":"")+"' id='vow"+i+"' onclick='toggleVow("+i+")'></div>";
    html+="<div>"+vows[i]+"</div>";
    html+="</div>";
  }

  html+="<div class='section-label'>DAMAGE</div>";
  html+="<div class='small-note'>ONLY MARK IF CONTAINMENT BROKE</div>";

  for(let i=0;i<damageStates.length;i++){
    html+="<div class='rule damage'>";
    html+="<div class='box "+(state.damage[todayIndex][i]?"checked":"")+"' id='damage"+i+"' onclick='toggleDamage("+i+")'></div>";
    html+="<div>"+damageStates[i]+"</div>";
    html+="</div>";
  }

  html+="</div>";
  html+="<div class='panel-buttons'>";
  html+="<button class='mini-btn' onclick='lockInDay()'>LOCK</button>";
  html+="<button class='mini-btn' onclick='showMain()'>BACK</button>";
  html+="</div>";
  html+="</div>";

  document.getElementById("playArea").innerHTML=html;
}

function showCode(){
  if(!poweredOn) return;

  stopPet();
  playMenu();

  let html="";
  html+="<div class='panel'>";
  html+="<div class='panel-title'>FIELD CODE</div>";
  html+="<div class='scroll'>";

  for(let i=0;i<codeNotes.length;i++){
    html+="<div class='note'>"+codeNotes[i]+"</div>";
  }

  html+="</div>";
  html+="<div class='panel-buttons'>";
  html+="<button class='mini-btn' onclick='showMain()'>BACK</button>";
  html+="</div>";
  html+="</div>";

  document.getElementById("playArea").innerHTML=html;
}

function toggleVow(index){
  state.vows[todayIndex][index]=!state.vows[todayIndex][index];
  saveState();

  let box=document.getElementById("vow"+index);
  if(box) box.classList.toggle("checked",state.vows[todayIndex][index]);

  playTick();
}

function toggleDamage(index){
  state.damage[todayIndex][index]=!state.damage[todayIndex][index];
  saveState();

  let box=document.getElementById("damage"+index);
  if(box) box.classList.toggle("checked",state.damage[todayIndex][index]);

  playTick();
}

function lockInDay(){
  if(!poweredOn || todayIndex<0) return;

  stopPet();

  let vowsKept=state.vows[todayIndex].filter(Boolean).length;
  let damageCount=state.damage[todayIndex].filter(Boolean).length;

  let passed=allVowsKept(todayIndex) && damageCount===0;

  state.statuses[todayIndex]=passed?"complete":"failed";
  saveState();

  if(passed){
    playVictory();
  }else{
    playFailure();
  }

  let petType=passed ? "king" : "rook";
  if(passed && cleanCount()===5) petType="angel";

  document.getElementById("playArea").innerHTML=
    petHTML(petType)+
    "<div class='ground'></div>"+
    "<div class='textbox'>"+
    "DAY SEALED<br>"+
    vowsKept+"/"+vows.length+" VOWS KEPT<br>"+
    (passed ? "INTEGRITY PRESERVED" : "INTEGRITY DAMAGED")+
    "</div>";

  renderDays();
  startPet();
}

function resetWeek(){
  if(!poweredOn) return;

  stopPet();

  playReset();
  state=freshState();
  saveState();
  showMain();
}

buildSounds();
renderDays();
</script>

</body>
</html>
