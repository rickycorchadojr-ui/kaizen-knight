<!DOCTYPE html>
<html>
<head>
  <title>Kaizen Knight</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      height:100vh;
      background:#222;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:'VT323', monospace;
      overflow:hidden;
    }

    .device{
      width:min(92vw, 420px);
      height:min(86vh, 740px);
      background:#d8d0b0;
      border:6px solid #111;
      border-radius:24px;
      padding:24px;
      box-sizing:border-box;
      box-shadow:0 8px 0 #111;
    }

    .screen{
      width:100%;
      height:68%;
      background:#e9ecd8;
      border:5px solid #111;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      box-sizing:border-box;
    }

    .screen.off,
    .screen.boot-dark{
      background:#111;
    }

    .status-bar{
      height:38px;
      border-bottom:4px solid #111;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:24px;
      letter-spacing:2px;
      flex-shrink:0;
    }

    .off .status-bar,
    .boot-dark .status-bar{
      color:#e9ecd8;
      border-bottom:4px solid #e9ecd8;
    }

    .play-area{
      flex:1;
      min-height:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      box-sizing:border-box;
      overflow:hidden;
    }

    .power-btn{
      background:#e9ecd8;
      color:#111;
      border:4px solid #e9ecd8;
      font-family:'VT323', monospace;
      font-size:34px;
      padding:8px 22px;
      box-shadow:none;
    }

    .boot-text{
      color:#e9ecd8;
      font-size:32px;
      letter-spacing:2px;
      animation:bootPulse .8s infinite steps(2);
    }

    @keyframes bootPulse{
      0%{opacity:1}
      50%{opacity:.35}
      100%{opacity:1}
    }

    .pet-zone{
      width:220px;
      height:130px;
      position:relative;
      margin-bottom:8px;
    }

    .pet-walker{
      position:absolute;
      left:50%;
      bottom:0;
      transform:translateX(-50%);
    }

    .pet-bob{
      animation:bob 1.2s infinite steps(2);
    }

    .knight-img{
      width:128px;
      height:128px;
      display:block;
      image-rendering:pixelated;
      image-rendering:crisp-edges;
      -ms-interpolation-mode:nearest-neighbor;
      object-fit:contain;
      opacity:.92;
      filter:grayscale(1) contrast(2) brightness(.55);
    }

    .pet-walker.right .knight-img{
      transform:scaleX(-1);
    }

    .pet-walker.left .knight-img{
      transform:scaleX(1);
    }

    @keyframes bob{
      0%{transform:translateY(0)}
      50%{transform:translateY(-4px)}
      100%{transform:translateY(0)}
    }

    .ground{
      width:100px;
      border-bottom:4px solid #111;
      margin-bottom:14px;
    }

    .textbox{
      width:100%;
      background:#f8f8f8;
      border-top:4px solid #111;
      padding:10px;
      box-sizing:border-box;
      text-align:center;
      font-size:26px;
      line-height:1.05;
    }

    .checklist-wrapper{
      width:100%;
      height:100%;
      min-height:0;
      display:flex;
      flex-direction:column;
      background:#f8f8f8;
    }

    .check-title{
      text-align:center;
      font-size:26px;
      padding:5px;
      border-bottom:4px solid #111;
      flex-shrink:0;
    }

    .checklist{
      flex:1;
      min-height:0;
      overflow-y:auto;
      padding:8px 10px;
      box-sizing:border-box;
    }

    .rule{
      display:flex;
      align-items:center;
      gap:8px;
      margin-bottom:5px;
      font-size:23px;
      line-height:.95;
    }

    .box{
      width:15px;
      height:15px;
      border:3px solid #111;
      background:#f8f8f8;
      flex-shrink:0;
      cursor:pointer;
    }

    .box.checked{
      background:#111;
    }

    .check-buttons{
      border-top:4px solid #111;
      padding:6px;
      display:flex;
      gap:8px;
      flex-shrink:0;
      background:#f8f8f8;
    }

    .mini-btn{
      flex:1;
      height:36px;
      background:#111;
      color:white;
      border:none;
      font-family:'VT323', monospace;
      font-size:24px;
      cursor:pointer;
    }

    .week-row{
      margin-top:18px;
      display:flex;
      justify-content:space-between;
      gap:5px;
    }

    .day{
      flex:1;
      height:34px;
      border:3px solid #111;
      background:#f8f8f8;
      font-size:20px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .day.complete{
      background:#111;
      color:white;
    }

    .day.failed{
      text-decoration:line-through;
    }

    .day.today{
      outline:3px solid #111;
    }

    .day.inactive{
      opacity:.35;
    }

    .buttons{
      margin-top:22px;
      display:flex;
      justify-content:space-between;
      gap:8px;
    }

    button{
      flex:1;
      height:48px;
      background:#111;
      color:white;
      border:none;
      font-family:'VT323', monospace;
      font-size:24px;
      box-shadow:0 4px 0 #333;
      cursor:pointer;
    }

    button:active{
      transform:translateY(3px);
      box-shadow:0 1px 0 #333;
    }
  </style>
</head>

<body>

<div class="device">

  <div class="screen off" id="screen">
    <div class="status-bar" id="statusBar">POWER OFF</div>
    <div class="play-area" id="playArea">
      <button class="power-btn" onclick="powerOn()">POWER</button>
    </div>
  </div>

  <div class="week-row">
    <div class="day" id="day0">MON</div>
    <div class="day" id="day1">TUE</div>
    <div class="day" id="day2">WED</div>
    <div class="day" id="day3">THU</div>
    <div class="day" id="day4">FRI</div>
  </div>

  <div class="buttons">
    <button onclick="showChecklist()">CHECK</button>
    <button onclick="showWeek()">WEEK</button>
    <button onclick="resetWeek()">RESET</button>
  </div>

</div>

<script>
const rules=[
  "RISK SETTINGS LOCKED",
  "MAX 5 CONTRACTS",
  "JOURNALED TRADES",
  "3PM LOCK CHECK",
  "SECOND ACCT SAFE",
  "STOPPED PAST -250",
  "BOTH ACCTS JOURNALED",
  "NO REVENGE TRADING",
  "ROUTINE ONLY",
  "COMPOSURE KEPT"
];

const days=["MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY"];
const shortDays=["MON","TUE","WED","THU","FRI"];

let todayIndex=getTradingDayIndex();
let weekKey=getWeekKey();
let state=loadState();

let moveTimer=null;
let petStep=0;
let poweredOn=false;

const petPositions=[50,40,32,44,58,66,54,50];
const sounds={};

function makeToneWav(freq=440,duration=.1,volume=.7){
  const sampleRate=22050;
  const samples=Math.floor(sampleRate*duration);
  const dataSize=samples*2;
  const buffer=new ArrayBuffer(44+dataSize);
  const view=new DataView(buffer);

  function writeString(offset,string){
    for(let i=0;i<string.length;i++){
      view.setUint8(offset+i,string.charCodeAt(i));
    }
  }

  writeString(0,"RIFF");
  view.setUint32(4,36+dataSize,true);
  writeString(8,"WAVE");
  writeString(12,"fmt ");
  view.setUint32(16,16,true);
  view.setUint16(20,1,true);
  view.setUint16(22,1,true);
  view.setUint32(24,sampleRate,true);
  view.setUint32(28,sampleRate*2,true);
  view.setUint16(32,2,true);
  view.setUint16(34,16,true);
  writeString(36,"data");
  view.setUint32(40,dataSize,true);

  for(let i=0;i<samples;i++){
    const t=i/sampleRate;
    const square=Math.sin(2*Math.PI*freq*t)>=0?1:-1;
    const fadeOut=1-(i/samples);
    const fadeIn=Math.min(1,i/(sampleRate*.01));
    const env=fadeOut*fadeIn;
    const sample=square*volume*env*32767;
    view.setInt16(44+i*2,sample,true);
  }

  let binary="";
  const bytes=new Uint8Array(buffer);
  const chunkSize=8192;

  for(let i=0;i<bytes.length;i+=chunkSize){
    const chunk=bytes.subarray(i,i+chunkSize);
    binary+=String.fromCharCode.apply(null,chunk);
  }

  return "data:audio/wav;base64,"+btoa(binary);
}

function buildSounds(){
  sounds.power=new Audio(makeToneWav(130,.08,.8));
  sounds.menu=new Audio(makeToneWav(500,.09,.75));
  sounds.tick=new Audio(makeToneWav(720,.045,.7));
  sounds.fail=new Audio(makeToneWav(170,.26,.8));
  sounds.reset=new Audio(makeToneWav(220,.18,.75));

  sounds.boot1=new Audio(makeToneWav(196,.09,.85));
  sounds.boot2=new Audio(makeToneWav(294,.10,.85));
  sounds.boot3=new Audio(makeToneWav(392,.11,.85));
  sounds.boot4=new Audio(makeToneWav(523,.15,.9));

  sounds.victory1=new Audio(makeToneWav(523,.13,.8));
  sounds.victory2=new Audio(makeToneWav(659,.13,.8));
  sounds.victory3=new Audio(makeToneWav(784,.24,.85));

  for(const key in sounds){
    sounds[key].preload="auto";
    sounds[key].playsInline=true;
  }
}

function playSound(name){
  if(!sounds[name]) return;

  const s=sounds[name].cloneNode();
  s.volume=1;
  s.play().catch(()=>{});
}

function playBoot(){
  playSound("power");
  setTimeout(()=>playSound("boot1"),90);
  setTimeout(()=>playSound("boot2"),210);
  setTimeout(()=>playSound("boot3"),340);
  setTimeout(()=>playSound("boot4"),500);
}

function playMenu(){
  playSound("menu");
}

function playTick(){
  playSound("tick");
}

function playFailure(){
  playSound("fail");
}

function playVictory(){
  playSound("victory1");
  setTimeout(()=>playSound("victory2"),150);
  setTimeout(()=>playSound("victory3"),300);
}

function playReset(){
  playSound("reset");
}

function getTradingDayIndex(){
  let d=new Date().getDay();
  if(d===0 || d===6) return -1;
  return d-1;
}

function getWeekKey(){
  let now=new Date();
  let day=now.getDay();
  let diff=now.getDate()-day+(day===0?-6:1);
  let monday=new Date(now.setDate(diff));
  return monday.toISOString().slice(0,10);
}

function freshState(){
  return{
    weekKey:weekKey,
    statuses:["inactive","inactive","inactive","inactive","inactive"],
    checks:Array.from({length:5},()=>Array(rules.length).fill(false))
  };
}

function loadState(){
  let saved=localStorage.getItem("kaizenKnight");
  if(!saved) return freshState();

  let parsed=JSON.parse(saved);
  if(parsed.weekKey!==weekKey) return freshState();

  return parsed;
}

function saveState(){
  localStorage.setItem("kaizenKnight",JSON.stringify(state));
}

function powerOn(){
  if(poweredOn) return;
  poweredOn=true;

  playBoot();
  showBoot();
}

function renderDays(){
  for(let i=0;i<5;i++){
    let el=document.getElementById("day"+i);
    el.className="day";

    if(state.statuses[i]==="complete") el.classList.add("complete");
    if(state.statuses[i]==="failed") el.classList.add("failed");
    if(state.statuses[i]==="inactive") el.classList.add("inactive");
    if(i===todayIndex) el.classList.add("today");
  }
}

function petHTML(){
  return `
    <div class="pet-zone">
      <div class="pet-walker left" id="petWalker">
        <div class="pet-bob">
          <img class="knight-img" src="knight.PNG" alt="Kaizen Knight">
        </div>
      </div>
    </div>
  `;
}

function stopPet(){
  clearInterval(moveTimer);
}

function startPet(delay=0){
  stopPet();

  setTimeout(()=>{
    const walker=document.getElementById("petWalker");
    if(!walker) return;

    petStep=0;
    walker.style.left=petPositions[petStep]+"%";

    moveTimer=setInterval(()=>{
      const current=petPositions[petStep];
      petStep=(petStep+1)%petPositions.length;
      const next=petPositions[petStep];

      if(next>current){
        walker.className="pet-walker right";
      }else if(next<current){
        walker.className="pet-walker left";
      }

      walker.style.left=next+"%";
    },1200);
  },delay);
}

function showBoot(){
  stopPet();
  renderDays();

  document.getElementById("screen").className="screen boot-dark";
  document.getElementById("statusBar").innerHTML="POWER";
  document.getElementById("playArea").innerHTML="<div class='boot-text'>BOOTING...</div>";

  setTimeout(()=>{
    document.getElementById("statusBar").innerHTML="KAIZEN KNIGHT";
  },650);

  setTimeout(()=>{
    document.getElementById("screen").className="screen";
    showMain(true);
  },1200);
}

function showMain(fromBoot=false){
  if(!poweredOn) return;

  stopPet();
  renderDays();

  document.getElementById("screen").className="screen";
  document.getElementById("statusBar").innerHTML="KAIZEN KNIGHT";

  let now = new Date();

  let timeString = now.toLocaleTimeString([], {
    hour: '2-digit',
    minute: '2-digit'
  });

  let dateString = now.toLocaleDateString([], {
    month: 'short',
    day: 'numeric'
  });

  if(todayIndex < 0){
    document.getElementById("playArea").innerHTML =
      petHTML() +
      "<div class='ground'></div>" +
      "<div class='textbox'>" +
      dateString + " • " + timeString +
      "<br>WEEKEND" +
      "<br>REST DAY" +
      "</div>";

    startPet(fromBoot ? 650 : 0);
    return;
  }

  let status = state.statuses[todayIndex];
  let text = "STEADY";

  if(status === "complete"){
    text = "DAY LOCKED CLEAN";
  }

  if(status === "failed"){
    text = "INTEGRITY DAMAGED";
  }

  document.getElementById("playArea").innerHTML =
    petHTML() +
    "<div class='ground'></div>" +
    "<div class='textbox'>" +
    dateString + " • " + timeString +
    "<br>" + days[todayIndex] +
    "<br>STATUS: " + text +
    "</div>";

  startPet(fromBoot ? 650 : 0);
}

function showChecklist(){
  if(!poweredOn) return;

  stopPet();

  if(todayIndex<0){
    showMain();
    return;
  }

  playMenu();

  let checks=state.checks[todayIndex];

  let html="";
  html+="<div class='checklist-wrapper'>";
  html+="<div class='check-title'>"+shortDays[todayIndex]+" VOW</div>";
  html+="<div class='checklist' id='checklist'>";

  for(let i=0;i<rules.length;i++){
    html+="<div class='rule'>";
    html+="<div class='box "+(checks[i]?"checked":"")+"' id='box"+i+"' onclick='toggleRule("+i+")'></div>";
    html+="<div>"+rules[i]+"</div>";
    html+="</div>";
  }

  html+="</div>";
  html+="<div class='check-buttons'>";
  html+="<button class='mini-btn' onclick='lockInDay()'>LOCK</button>";
  html+="<button class='mini-btn' onclick='showMain()'>BACK</button>";
  html+="</div>";
  html+="</div>";

  document.getElementById("playArea").innerHTML=html;
}

function toggleRule(index){
  state.checks[todayIndex][index]=!state.checks[todayIndex][index];
  saveState();

  let box=document.getElementById("box"+index);
  if(box){
    box.classList.toggle("checked",state.checks[todayIndex][index]);
  }

  playTick();
}

function lockInDay(){
  if(!poweredOn) return;

  stopPet();

  let checks=state.checks[todayIndex];
  let total=checks.filter(Boolean).length;
  let passed=total===rules.length;

  state.statuses[todayIndex]=passed?"complete":"failed";
  saveState();

  if(passed){playVictory()}else{playFailure()}

  document.getElementById("playArea").innerHTML =
    petHTML() +
    "<div class='ground'></div>" +
    "<div class='textbox'>" +
    "DAY LOCKED<br>"+total+"/10 RULES KEPT<br>"+
    (passed?"DISCIPLINE MAINTAINED":"INTEGRITY DAMAGED")+
    "</div>";

  renderDays();
  startPet();
}

function showWeek(){
  if(!poweredOn) return;

  stopPet();

  playMenu();
  renderDays();

  let clean=state.statuses.filter(s=>s==="complete").length;
  let failed=state.statuses.filter(s=>s==="failed").length;
  let active=state.statuses.filter(s=>s!=="inactive").length;

  document.getElementById("playArea").innerHTML =
    petHTML() +
    "<div class='ground'></div>" +
    "<div class='textbox'>" +
    "WEEK "+weekKey+"<br>"+
    "CLEAN:"+clean+" FAILED:"+failed+"<br>"+
    "ACTIVE DAYS:"+active+
    "</div>";

  startPet();
}

function resetWeek(){
  if(!poweredOn) return;

  stopPet();

  playReset();
  state=freshState();
  saveState();
  showMain();
}

buildSounds();
renderDays();
</script>

</body>
</html>
