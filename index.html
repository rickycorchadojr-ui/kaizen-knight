function seasonalOverlayHTML(){

  const month=new Date().getMonth();

  const isOctober=month===9;
  const isDecember=month===11;

  if(FORCE_HALLOWEEN_TEST || isOctober){
    return "<img class='halloween-overlay' src='Halloween.png'>";
  }

  if(FORCE_CHRISTMAS_TEST || isDecember){
    return "<img class='halloween-overlay' src='Christmas.png'>";
  }

  return "";
}

function getDayKey(){
  const d=new Date();
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,"0");
  const day=String(d.getDate()).padStart(2,"0");
  return y+"-"+m+"-"+day;
}

function rollPowerQuoteForToday(){
  const dayKey=getDayKey();

  if(state.powerQuoteDayKey===dayKey) return;

  state.powerQuoteDayKey=dayKey;

  let total=0;
  for(let i=0;i<powerQuotes.length;i++){
    total+=powerQuotes[i].weight;
  }

  let roll=Math.random()*total;
  let chosen=0;

  for(let i=0;i<powerQuotes.length;i++){
    roll-=powerQuotes[i].weight;
    if(roll<=0){
      chosen=i;
      break;
    }
  }

  state.powerQuoteIndex=chosen;
  saveState();
}

function renderPowerQuote(){
  const quote=powerQuotes[state.powerQuoteIndex] || powerQuotes[0];

  const textEl=document.getElementById("powerQuoteText");
  const authorEl=document.getElementById("powerQuoteAuthor");

  if(textEl) textEl.innerHTML=quote.text;
  if(authorEl) authorEl.innerHTML=quote.author;
}

function rollRainbowForToday(){
  const dayKey=getDayKey();

  if(state.rainbowDayKey===dayKey) return;

  state.rainbowDayKey=dayKey;
  state.rainbowToday=Math.floor(Math.random()*RAINBOW_CHANCE)===0;

  saveState();
}

      if(state.damage[d][i]) return true;
    }

    if(state.recoveryDamage && state.recoveryDamage[d]){
      for(let i=0;i<recoveryDamageStates.length;i++){
        if(state.recoveryDamage[d][i]) return true;

  return min+Math.random()*(max-min);
}

  return Math.floor(randRange(SKY_MIN_Y,SKY_MAX_Y));
}

function randDirection(){
  return Math.random()<.5 ? "right" : "left";
}

  return "--sky-top:"+top+"px;--sky-duration:"+duration+"s;--sky-delay:"+delay+"s;";
}

  if(state.streak<35) return "";

  const dir=randDirection();

  const top=randSkyTop();

  const duration=randRange(
    UFO_MIN_DURATION,
    UFO_MAX_DURATION
  ).toFixed(2);

  const delay=randRange(
    0,
    UFO_MAX_DELAY
  ).toFixed(2);

  return "<div class='sky-object ufo-object fly-"+dir+"' style='"+skyStyle(top,duration,delay)+"'><img class='sky-img' src='ufo.png'></div>";

  const dir=randDirection();
  const top=Math.floor(randRange(2,18));
  const duration=randRange(22,34).toFixed(2);
  const delay=randRange(0,6).toFixed(2);

  return "<div class='sky-object plane-object fly-"+dir+"' style='"+skyStyle(top,duration,delay)+"'><img class='sky-img' id='planeImg' src='./Plane1.png'></div>";

function startSkyAnimations(){

  const plane=document.getElementById("planeImg");

  if(!plane) return;

  let frame=1;

  setInterval(()=>{

    frame++;

    if(frame>PLANE_FRAME_COUNT){
      frame=1;
    }

    plane.src="./Plane"+frame+".png";

  },1000/PLANE_FPS);
}
function getAchievementDays(){
  let arr=[];
  for(let i=1;i<=100;i++) arr.push(i);
  for(let i=105;i<=365;i+=5) arr.push(i);
  return arr;
}
function isAchievementDay(day){
  if(day>=1 && day<=100) return true;
  if(day>100 && day<=365 && day%5===0) return true;
  return false;
}
function formatToday(){
  const now=new Date();
  const months=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  return months[now.getMonth()]+" "+now.getDate()+" "+now.getFullYear();
}

}
function makeToneSequenceWav(sequence){
  const sampleRate=22050;
  let totalSamples=0;
  for(let i=0;i<sequence.length;i++) totalSamples+=Math.floor(sampleRate*sequence[i].duration);
  const dataSize=totalSamples*2;
  const buffer=new ArrayBuffer(44+dataSize);
  const view=new DataView(buffer);
  function writeString(offset,string){
    for(let i=0;i<string.length;i++) view.setUint8(offset+i,string.charCodeAt(i));
  }
  writeString(0,"RIFF");
  view.setUint32(4,36+dataSize,true);
  writeString(8,"WAVE");
  writeString(12,"fmt ");
  view.setUint32(16,16,true);
  view.setUint16(20,1,true);
  view.setUint16(22,1,true);
  view.setUint32(24,sampleRate,true);
  view.setUint32(28,sampleRate*2,true);
  view.setUint16(32,2,true);
  view.setUint16(34,16,true);
  writeString(36,"data");
  view.setUint32(40,dataSize,true);
  let sampleIndex=0;
  for(let s=0;s<sequence.length;s++){
    const freq=sequence[s].freq;
    const duration=sequence[s].duration;
    const volume=sequence[s].volume || .7;
    const samples=Math.floor(sampleRate*duration);
    for(let i=0;i<samples;i++){
      let sample=0;
      if(freq>0){
        const t=i/sampleRate;
        const square=Math.sin(2*Math.PI*freq*t)>=0?1:-1;
        const fade=1-(i/samples);
        sample=square*volume*fade*32767;
      }
      view.setInt16(44+sampleIndex*2,sample,true);
      sampleIndex++;
    }
  }
  let binary="";
  const bytes=new Uint8Array(buffer);
  for(let i=0;i<bytes.length;i++) binary+=String.fromCharCode(bytes[i]);
  return "data:audio/wav;base64,"+btoa(binary);
}

function stopStreakMusic(){

  if(bgMusic){
    bgMusic.pause();
    bgMusic.currentTime=0;
  }

  bgMusic=null;
  currentMusicFile=null;
}

function updateStreakMusic(){

  if(!poweredOn) return;

  const song=getStreakSong();

  if(!song){
    stopStreakMusic();
    return;
  }

  if(currentMusicFile===song.file && bgMusic){
    return;
  }

  stopStreakMusic();

  currentMusicFile=song.file;

  bgMusic=new Audio(song.file);

  bgMusic.loop=true;
  bgMusic.volume=MUSIC_VOLUME;

  bgMusic.play().catch(()=>{});
}

}

function vaultCoinsHTML(count){
  let goldValue=COPPER_PER_SILVER*SILVER_PER_GOLD;
  let gold=Math.floor(count/goldValue);
  let rem=count%goldValue;
  let silver=Math.floor(rem/COPPER_PER_SILVER);
  let copper=rem%COPPER_PER_SILVER;

  function repeatCoin(symbol,num,max){
    let shown=Math.min(num,max);
    let s="";
    for(let i=0;i<shown;i++) s+=symbol;
    if(num>max) s+=" +";
    return s;
  }

  let html="";
  if(gold>0) html+="<div>"+repeatCoin("🥇",gold,8)+"</div>";
  if(silver>0) html+="<div>"+repeatCoin("🥈",silver,10)+"</div>";
  if(copper>0) html+="<div>"+repeatCoin("🥉",copper,14)+"</div>";
  if(count<=0) html+="<div>□</div>";
  return html;
}

function repairWeeklyStatusesFromChecklist(){

  if(!state.statuses || state.statuses.length!==6){
    state.statuses=["inactive","inactive","inactive","inactive","inactive","inactive"];
  }

  for(let d=0;d<6;d++){

    let vows = d===0 ? state.sundayVows : state.weekdayVows[d];
    let damage = state.damage[d];

    if(!vows || !damage) continue;

    let anyVowChecked=vows.some(v=>v);
    let anyDamageChecked=damage.some(v=>v);

    if(!anyVowChecked && !anyDamageChecked) continue;

    let allVowsChecked=vows.every(v=>v);

    if(allVowsChecked && !anyDamageChecked){
      state.statuses[d]="complete";
    }else{
      state.statuses[d]="failed";
    }
  }
}

function startPet(delay=0){
  stopPet();
  setTimeout(()=>{
    const walker=document.getElementById("petWalker");
    const pet=document.getElementById("petImg");
    if(!walker || !pet) return;
    startSleepOverlay();
    petStep=0;
    walker.style.left=petPositions[petStep]+"%";
    walker.className="pet-walker left";
    if(isSleepTime()){
      const petType=pet.dataset.petType;
      if(canPetBlink(petType)){
        pet.src=getPetBlinkImage(petType);
      }else{
        pet.src=getPetImage(petType);
      }
      return;
    }
    moveTimer=setInterval(()=>{
      const current=petPositions[petStep];
      petStep=(petStep+1)%petPositions.length;
      const next=petPositions[petStep];
      const petType=pet.dataset.petType;
      if(isSleepTime()){
        walker.className="pet-walker left";
        if(canPetBlink(petType)){
          pet.src=getPetBlinkImage(petType);
        }else{
          pet.src=getPetImage(petType);
        }
        clearInterval(moveTimer);
        moveTimer=null;
        startSleepOverlay();
        return;
      }
      if(next>current){
        walker.className="pet-walker right";
        pet.src=getPetImage(petType);
      }else if(next<current){
        walker.className="pet-walker left";
        pet.src=getPetImage(petType);
      }else{
        if(canPetBlink(petType)){
          pet.src=getPetBlinkImage(petType);
        }
      }
      walker.style.left=next+"%";
    },1200);
  },delay);
}

function weeklyVowPercent(){
  let checked=0;
  let total=0;

  for(let i=0;i<sundayVows.length;i++){
    total++;
    if(state.sundayVows[i]) checked++;
  }

  for(let d=1;d<=5;d++){
    if(d===todayIndex && state.dayMode==="light"){
      for(let i=0;i<lightSessionVows.length;i++){
        total++;
        if(state.lightSessionVows[d][i]) checked++;
      }
    }else{
      for(let i=0;i<weekdayVows.length;i++){
        total++;
        if(state.weekdayVows[d][i]) checked++;
      }
    }
  }

  if(total<=0) return 0;
  return Math.floor((checked/total)*100);
}

function playTrainingNote(progress){
  const scale=[0,1,2,3,4,5,6,7,6,5,4,3,2,1,0];
  const idx=scale[(progress-1) % scale.length];
  playVowNote(idx);
}

function addTrainingDrill(){
  if(!requirePower()) return;

  resetTrainingForNewDay();

  state.todayDrills++;
  state.lifetimeDrills++;

  let promoted=false;

  if(state.todayDrills>=state.trainingTarget && !state.trainingCompleteToday){
    state.trainingCompleteToday=true;
    state.trainingDays++;
    state.trainingCompletedDays++;

    if(state.trainingCompletedDays>0 && state.trainingCompletedDays%TRAINING_PROMOTION_DAYS===0){
      state.trainingRank++;
      state.trainingTarget++;
state.trainingPromotedToday=true;
      promoted=true;
    }
  }

  saveState();

  if(promoted){
    play("resolve");
    showTrainingPromotion();
    return;
  }

  if(state.trainingCompleteToday && state.todayDrills===state.trainingTarget){
    play("good");
  }else{
    playTrainingNote(state.todayDrills);
  }

  showTrain(false);
}

function removeTrainingDrill(){
  if(!requirePower()) return;

  resetTrainingForNewDay();

  if(state.todayDrills<=0){
    play("reset");
    showTrain(false);
    return;
  }

  if(state.trainingPromotedToday && state.todayDrills<=state.trainingTarget){
    state.trainingRank=Math.max(0,state.trainingRank-1);
    state.trainingTarget=Math.max(1,state.trainingTarget-1);
    state.trainingPromotedToday=false;
  }

  state.todayDrills--;
  state.lifetimeDrills=Math.max(0,state.lifetimeDrills-1);

  if(state.trainingCompleteToday && state.todayDrills<state.trainingTarget){
    state.trainingCompleteToday=false;
    state.trainingDays=Math.max(0,state.trainingDays-1);
    state.trainingCompletedDays=Math.max(0,state.trainingCompletedDays-1);
  }

  play("reset");
  saveState();
  showTrain(false);
}

function submitGateTest(){
  if(!requirePower()) return;

  let missed=0;

  for(let i=0;i<state.gateAnswers.length;i++){
    if(!state.gateAnswers[i]) missed++;
  }

  state.gateCompleted=true;

if(missed>=GATE_FAIL_LIMIT){
  state.dayMode="recovery";
  state.gatePassed=false;
  state.recoveryChosen=true;
  state.readinessScore=getReadinessScore();
  state.readinessWeather="STORM";

  awardRecoveryDay();

saveState();
playMorningGateFinal();
showGateFailedScreen();
return;
}

state.gatePassed=true;
state.readinessScore=getReadinessScore();

if(missed>=GATE_LIGHT_LIMIT){
  state.dayMode="light";
  state.readinessWeather="CLOUDY";
}else{
  state.dayMode="trade";
  state.readinessWeather=getReadinessWeather(state.readinessScore);
}

saveState();
playMorningGateFinal();
showGatePassedScreen();
}

function getReadinessScore(){
  let checked=0;

  for(let i=0;i<state.gateAnswers.length;i++){
    if(state.gateAnswers[i]) checked++;
  }

  return Math.floor((checked/state.gateAnswers.length)*100);
}

function getReadinessWeather(score){
  if(score>=90) return "CLEAR";
  if(score>=75) return "FAIR";
  if(score>=60) return "CLOUDY";
  if(score>=40) return "FOGGY";
  return "STORM";
}

function getReadinessMessage(weather){
  if(weather==="CLEAR") return "TODAY IS FAVORABLE FOR DECISIVE ACTION.";
  if(weather==="FAIR") return "TRADE WITH RESPECT. DO NOT FORCE.";
  if(weather==="CLOUDY") return "LIGHT SESSION ADVISED. MOVE SLOWLY.";
  if(weather==="FOGGY") return "LIGHT SESSION ADVISED.";
  return "RECOVERY ADVISED. DO NOT TRADE.";
}

function lockDay(){
  if(!requirePower()) return;

  if(!confirm("LOCK THIS DAY? THIS CANNOT BE UNDONE.")) return;

if(state.statuses[todayIndex]!=="inactive"){
  play("reset");
  showMain();
  return;
}

  stopPet();
  stopFirework();

  let passed=true;
  let vowState=getVowStateForToday();

if(state.dayMode==="recovery"){
  vowState=state.recoveryVows[todayIndex];
}

if(state.dayMode==="light"){
  vowState=state.lightSessionVows[todayIndex];
}

  for(let i=0;i<vowState.length;i++){
    if(!vowState[i]) passed=false;
  }

  if(state.dayMode==="recovery"){
    for(let i=0;i<recoveryDamageStates.length;i++){
      if(state.recoveryDamage[todayIndex][i]) passed=false;
    }
}else if(state.dayMode==="damage"){
  passed=false;
}else{
    for(let i=0;i<damageStates.length;i++){
      if(state.damage[todayIndex][i]) passed=false;
    }
  }

if(state.dayMode==="recovery" && passed){
  state.statuses[todayIndex]="recovery";
}else{
  state.statuses[todayIndex]=passed ? "complete" : "failed";
}

  if(state.dayMode!=="recovery" && state.dayMode!=="damage"){
    mintVaultCoinsForToday();
  }

  let newRecord=false;
  let newAchievement=false;

if(passed){
  state.crackActive=false;

  if(state.dayMode!=="recovery"){
    state.streak++;

    if(recordAchievement(state.streak)){
      newAchievement=true;
    }

    if(state.streak>state.bestStreak && state.streak<=365){
      state.bestStreak=state.streak;
      newRecord=true;
    }
  }
}else{
  state.streak=0;

if(state.dayMode==="trade" || state.dayMode==="light"){
  state.damageProtocolActive=true;
}
}

  let shouldPlayFirework=passed && todayIndex===5 && perfectWeek();
  let weeklyForm=null;

  if(todayIndex===5){
    if(shouldPlayFirework){
      weeklyForm="angel";
    }else{
      weeklyForm=formFromWeeklyPercent(weeklyVowPercent());
    }

    state.finalForm=weeklyForm;
    addWeekRecord(weeklyForm);
  }

  saveState();

  if(shouldPlayFirework){
    play("perfectWeek");
  }else if(passed){
    play("resolve");
  }else{
    play("fail");
  }

  renderDays();

  let petType=passed ? "king" : "rook";

  if(todayIndex===5 && weeklyForm){
    petType=weeklyForm;
  }

  let sealText="DAY SEALED";
  let resultText=passed ? "INTEGRITY PRESERVED" : "INTEGRITY DAMAGED";

  if(state.dayMode==="recovery"){
    sealText="RECOVERY SEALED";
    resultText=passed ? "READINESS RESTORED" : "RECOVERY DAMAGED";
  }

if(state.dayMode==="damage" && state.damageProtocolActive){
  sealText="DAMAGE CONTAINED";
  resultText="REPAIR PROTOCOL COMPLETE";
}

  if(shouldPlayFirework){
    sealText="PERFECT WEEK!";
    resultText="INTEGRITY PRESERVED";
  }else if(todayIndex===5 && weeklyForm){
    sealText="WEEK FORM";
    resultText=weeklyVowPercent()+"% VOWS KEPT";
  }

  document.getElementById("playArea").innerHTML=
    achievementHTML()+
    streakHTML()+
    sceneBackgroundHTML()+
    seasonalOverlayHTML()+
    rainbowHTML()+
    crackHTML()+
    ufoHTML()+
    planeHTML()+
    petHTML(petType)+
    "<div class='ground'></div>"+
    "<div class='textbox'>"+
    sealText+
    "<br>"+resultText+
    "</div>";

  startPet();
  startSkyAnimations();
  updateStreakMusic();

  if(shouldPlayFirework) setTimeout(()=>startFirework(),450);

  if(newRecord && newAchievement){
    setTimeout(()=>showAchievementBanner(state.streak),650);
  }
}
function makeSaveData(){
  return JSON.stringify({
    kaizenKnightSave:true,
    exportedAt:new Date().toISOString(),
    state:state
  });
}

function copySaveData(){
  if(!requirePower()) return;

  const saveText=makeSaveData();

  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(saveText).then(()=>{
      play("good");
      document.getElementById("statusBar").innerHTML="SAVE COPIED";
    }).catch(()=>{
      showExportSave(saveText);
    });
  }else{
    showExportSave(saveText);
  }
}

function showExportSave(saveText){
  stopPet();
  stopFirework();

  document.getElementById("playArea").innerHTML=
    "<div class='panel'>"+
    "<div class='panel-title'>COPY SAVE</div>"+
    "<div class='scroll'>"+
    "<div class='save-message'>COPY THIS TEXT INTO NOTES</div>"+
    "<textarea class='save-textarea' id='exportBox' readonly></textarea>"+
    "</div>"+
    "<div class='panel-buttons'>"+
    "<button class='mini-btn' onclick='showCode()'>BACK</button>"+
    "</div>"+
    "</div>";

  const box=document.getElementById("exportBox");
  box.value=saveText;
  box.focus();
  box.select();
}

function showImportSave(){
  if(!requirePower()) return;

  play("menu");
  stopPet();
  stopFirework();

  document.getElementById("playArea").innerHTML=
    "<div class='panel'>"+
    "<div class='panel-title'>RESTORE SAVE</div>"+
    "<div class='scroll'>"+
    "<div class='save-message'>PASTE SAVE TEXT BELOW</div>"+
    "<textarea class='save-textarea' id='importBox'></textarea>"+
    "<div class='small-note'>RESTORE WILL REPLACE CURRENT DATA</div>"+
    "</div>"+
    "<div class='panel-buttons'>"+
    "<button class='mini-btn' onclick='restoreSaveData()'>RESTORE</button>"+
    "<button class='mini-btn' onclick='showCode()'>BACK</button>"+
    "</div>"+
    "</div>";
}

function restoreSaveData(){
  const box=document.getElementById("importBox");

  if(!box) return;

  try{
    const parsed=JSON.parse(box.value.trim());
    const imported=parsed.state ? parsed.state : parsed;

    if(!imported.statuses || typeof imported.streak!=="number"){
      throw new Error("Invalid save");
    }

    state=imported;

// Keep restored weekly progress attached to the current visible week.
// Without this, loadState() may treat the imported save as an old week
// and reset the SUN-FRI progress bar after reload.
state.weekKey=weekKey;

    if(!state.achievements) state.achievements={};
if(!state.records) state.records=[];
if(!state.recoveryLog) state.recoveryLog=[];
if(!state.vault) state.vault=createFreshVault();
if(typeof state.trainingDate==="undefined") state.trainingDate=getDayKey();
if(typeof state.trainingRank==="undefined") state.trainingRank=0;
if(typeof state.trainingTarget==="undefined") state.trainingTarget=15;
if(typeof state.todayDrills==="undefined") state.todayDrills=0;
if(typeof state.lifetimeDrills==="undefined") state.lifetimeDrills=0;
if(typeof state.trainingDays==="undefined") state.trainingDays=0;
if(typeof state.trainingCompletedDays==="undefined") state.trainingCompletedDays=0;
if(typeof state.trainingCompleteToday==="undefined") state.trainingCompleteToday=false;
if(typeof state.trainingPromotedToday==="undefined") state.trainingPromotedToday=false;


ensureVault();
repairWeeklyStatusesFromChecklist();
saveState();

    play("good");

    document.getElementById("statusBar").innerHTML="SAVE RESTORED";

    setTimeout(()=>{ location.reload(); },450);

  }catch(e){

    play("fail");

    document.getElementById("statusBar").innerHTML="RESTORE FAILED";
  }
}
ensureDailyModeFresh();
resetTrainingForNewDay();
state.crackActive=anyDamageActive();
saveState();
rollRainbowForToday();
rollPowerQuoteForToday();
buildSounds();
ensureAchievementArchive();
renderPowerQuote();
renderDays();
</script>
