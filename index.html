<!DOCTYPE html>
<html>
<head>
  <title>Kaizen Knight</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kaizen Knight">
  <meta name="theme-color" content="#222222">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" href="icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    body{margin:0;height:100vh;background:#222;display:flex;justify-content:center;align-items:center;font-family:'VT323',monospace;overflow:hidden;-webkit-user-select:none;user-select:none;touch-action:manipulation;}
    .device{width:min(92vw,420px);height:min(86vh,740px);background:#d8d0b0;border:6px solid #111;border-radius:24px;padding:24px;box-sizing:border-box;box-shadow:0 8px 0 #111;}
    .screen{width:100%;height:68%;background:#e9ecd8;border:5px solid #111;display:flex;flex-direction:column;overflow:hidden;box-sizing:border-box;}
    .screen.off,.screen.boot-dark{background:#111;}
    .status-bar{height:38px;border-bottom:4px solid #111;display:flex;justify-content:center;align-items:center;font-size:24px;letter-spacing:2px;flex-shrink:0;}
    .off .status-bar,.boot-dark .status-bar{color:#e9ecd8;border-bottom:4px solid #e9ecd8;}
    .play-area{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;align-items:center;box-sizing:border-box;overflow:hidden;position:relative;}

    .scene-bg{
      position:absolute;
      left:50%;
      bottom:68px;
      width:320px;
      height:200px;
      transform:translateX(-50%);
      object-fit:contain;
      image-rendering:pixelated;
      image-rendering:crisp-edges;
      z-index:1;
      pointer-events:none;
    }

    .achievement-banner{position:absolute;top:0;left:50%;transform:translate(-50%,-120%);background:#111;color:#f8f8f8;border:4px solid #f8f8f8;font-size:30px;line-height:1;padding:7px 18px;z-index:20;white-space:nowrap;letter-spacing:2px;pointer-events:none;}
    .achievement-banner.show{animation:achievementDrop 2.05s forwards;}
    @keyframes achievementDrop{
      0%{transform:translate(-50%,-120%);}
      18%{transform:translate(-50%,8px);}
      72%{transform:translate(-50%,8px);}
      100%{transform:translate(-50%,-120%);}
    }
    .streak-counter{position:absolute;top:8px;right:10px;font-size:32px;line-height:.8;color:#111;text-align:right;min-width:0;font-family:'VT323',monospace;letter-spacing:1px;z-index:5;}
    .power-quote{width:88%;background:#111;color:#e9ecd8;border:4px solid #e9ecd8;font-family:'VT323',monospace;font-size:24px;line-height:1.02;padding:14px 12px;box-shadow:none;text-align:center;}
    .power-author{display:block;margin-top:10px;font-size:22px;}
    .boot-text{color:#e9ecd8;font-size:32px;letter-spacing:2px;animation:bootPulse .8s infinite steps(2);}
    @keyframes bootPulse{0%{opacity:1}50%{opacity:.35}100%{opacity:1}}

    .pet-zone{width:240px;height:130px;position:relative;margin-bottom:-10px;z-index:2;}
    .pet-walker{position:absolute;left:50%;bottom:28px;transform:translateX(-50%);}
    .pet-bob{animation:bob 1.2s infinite steps(2);position:relative;width:160px;height:160px;}
    .pet-img{width:160px;height:160px;display:block;image-rendering:pixelated;image-rendering:crisp-edges;object-fit:contain;opacity:.92;filter:grayscale(1) contrast(2) brightness(.55);}
    .pet-img.clean-img{filter:none;opacity:1;}
    .firework-img{width:160px;height:160px;position:absolute;left:0;top:0;display:none;image-rendering:pixelated;image-rendering:crisp-edges;object-fit:contain;pointer-events:none;z-index:3;}
    .pet-walker.right .pet-img{transform:scaleX(-1);}
    .pet-walker.left .pet-img{transform:scaleX(1);}
    @keyframes bob{0%{transform:translateY(0)}50%{transform:translateY(-4px)}100%{transform:translateY(0)}}
    .ground{width:100px;border-bottom:4px solid #111;margin-bottom:14px;position:relative;z-index:2;}
    .textbox{width:100%;background:#f8f8f8;border-top:4px solid #111;padding:9px;box-sizing:border-box;text-align:center;font-size:24px;line-height:1.03;position:relative;z-index:3;}
    .subline{font-size:20px;opacity:.9;}
    .panel{width:100%;height:100%;display:flex;flex-direction:column;background:#f8f8f8;}
    .panel-title{text-align:center;font-size:25px;padding:5px;border-bottom:4px solid #111;flex-shrink:0;}
    .scroll{flex:1;overflow-y:auto;padding:8px 10px;box-sizing:border-box;}
    .section-label{font-size:23px;margin:8px 0 5px;border-bottom:3px solid #111;letter-spacing:1px;}
    .rule{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:22px;line-height:1.0;}
    .box{width:15px;height:15px;border:3px solid #111;background:#f8f8f8;flex-shrink:0;cursor:pointer;margin-top:2px;}
    .box.checked{background:#111;}
    .note{font-size:22px;line-height:1.05;margin-bottom:12px;padding-bottom:8px;border-bottom:2px dotted #111;}
    .small-note{font-size:19px;opacity:.85;margin:4px 0 10px;text-align:center;}
    .panel-buttons{border-top:4px solid #111;padding:6px;display:flex;gap:8px;background:#f8f8f8;}
    .mini-btn{flex:1;height:36px;background:#111;color:white;border:none;font-family:'VT323',monospace;font-size:24px;}
    .week-row{margin-top:18px;display:flex;justify-content:space-between;gap:5px;}
    .day{flex:1;height:34px;border:3px solid #111;background:#f8f8f8;font-size:19px;display:flex;justify-content:center;align-items:center;}
    .day.complete{background:#111;color:white;}
    .day.failed{text-decoration:line-through;}
    .day.today{outline:3px solid #111;}
    .day.inactive{opacity:.35;}
    .buttons{margin-top:22px;display:flex;gap:8px;}
    button{flex:1;height:48px;background:#111;color:white;border:none;font-family:'VT323',monospace;font-size:24px;box-shadow:0 4px 0 #333;}
    button:active{transform:translateY(3px);box-shadow:0 1px 0 #333;}
  </style>
</head>
<body>
<div class="device">
  <div class="screen off" id="screen">
    <div class="status-bar" id="statusBar">POWER OFF</div>
    <div class="play-area" id="playArea">
      <button class="power-quote" onclick="powerOn()">
        “The minute that we change our minds and stop giving power to the past, the past with its mistakes loses its power over us.”
        <span class="power-author">— Psycho-Cybernetics</span>
      </button>
    </div>
  </div>
  <div class="week-row">
    <div class="day" id="day0">SUN</div>
    <div class="day" id="day1">MON</div>
    <div class="day" id="day2">TUE</div>
    <div class="day" id="day3">WED</div>
    <div class="day" id="day4">THU</div>
    <div class="day" id="day5">FRI</div>
  </div>
  <div class="buttons">
    <button onclick="showCheckWithMenuSound()">CHECK</button>
    <button onclick="showCode()">CODE</button>
    <button onclick="resetWeek()">RESET</button>
  </div>
</div>

<script>
const weekdayVows=[
  "LOCK RISK SETTINGS",
  "RECORD EVERY SESSION",
  "MAX CONTRACTS 5",
  "DON'T TRADE OUTSIDE ROUTINE",
  "DON'T SIZE UP AFTER A LOSS",
  "JOURNAL BOTH ACCOUNTS",
  "IF STOP HIT, NO TRADING SECOND ACCOUNT",
  "DRILLS"
];
const sundayVows=[
  "LOCK BOTH ACCOUNTS",
  "DRILLS"
];
const damageStates=[
  "SPIRALED AFTER LOSS",
  "TRADED OUTSIDE ROUTINE",
  "RISK SETTINGS REMOVED",
  "BOUGHT / RESET COMBINE"
];
const codeNotes=[
  "CONSIDER STOPPING AT -250.",
  "LOOK FOR CHOP AND MANIPULATION.",
  "DON'T RELY ON STOPS. STAY ALERT.",
  "SESSION WILL END QUICKLY. BE MINDFUL.",
  "MANAGE MOODS OUTSIDE OF TRADING.",
  "YOU ARE ALL THAT STANDS BETWEEN A PROFITABLE ACCOUNT AND THE MARKET.",
  "WHAT IF IT WORKS OUT?",
  "I AM DETERMINED TO HAVE A GOOD DAY REGARDLESS OF WHAT HAPPENS.",
  "BE GRATEFUL. SHOW REVERENCE FOR EVERY COMBINE."
];
const days=["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY"];
let todayIndex=getTradingDayIndex();
let weekKey=getWeekKey();
let state=loadState();
let moveTimer=null;
let petStep=0;
let poweredOn=false;
let fireworkTimer=null;
let fireworkFrame=1;
let achievementTimer=null;
const petPositions=[50,40,32,32,44,58,66,66,54,50];
const sounds={};

function requirePower(){ return poweredOn; }
function getTodaysVows(){ return todayIndex===0 ? sundayVows : weekdayVows; }

function sceneBackgroundHTML(){
  return "<img class='scene-bg' src='bgtest.png'>";
}

function makeToneSequenceWav(sequence){
  const sampleRate=22050;
  let totalSamples=0;
  for(let i=0;i<sequence.length;i++){
    totalSamples+=Math.floor(sampleRate*sequence[i].duration);
  }
  const dataSize=totalSamples*2;
  const buffer=new ArrayBuffer(44+dataSize);
  const view=new DataView(buffer);
  function writeString(offset,string){
    for(let i=0;i<string.length;i++) view.setUint8(offset+i,string.charCodeAt(i));
  }
  writeString(0,"RIFF");
  view.setUint32(4,36+dataSize,true);
  writeString(8,"WAVE");
  writeString(12,"fmt ");
  view.setUint32(16,16,true);
  view.setUint16(20,1,true);
  view.setUint16(22,1,true);
  view.setUint32(24,sampleRate,true);
  view.setUint32(28,sampleRate*2,true);
  view.setUint16(32,2,true);
  view.setUint16(34,16,true);
  writeString(36,"data");
  view.setUint32(40,dataSize,true);
  let sampleIndex=0;
  for(let s=0;s<sequence.length;s++){
    const freq=sequence[s].freq;
    const duration=sequence[s].duration;
    const volume=sequence[s].volume || .7;
    const samples=Math.floor(sampleRate*duration);
    for(let i=0;i<samples;i++){
      let sample=0;
      if(freq>0){
        const t=i/sampleRate;
        const square=Math.sin(2*Math.PI*freq*t)>=0?1:-1;
        const fade=1-(i/samples);
        sample=square*volume*fade*32767;
      }
      view.setInt16(44+sampleIndex*2,sample,true);
      sampleIndex++;
    }
  }
  let binary="";
  const bytes=new Uint8Array(buffer);
  for(let i=0;i<bytes.length;i++) binary+=String.fromCharCode(bytes[i]);
  return "data:audio/wav;base64,"+btoa(binary);
}

function buildSounds(){
  sounds.tick=new Audio(makeToneSequenceWav([{freq:720,duration:.04,volume:.7}]));
  sounds.menu=new Audio(makeToneSequenceWav([{freq:500,duration:.08,volume:.7}]));
  sounds.fail=new Audio(makeToneSequenceWav([{freq:180,duration:.25,volume:.8}]));
  sounds.reset=new Audio(makeToneSequenceWav([{freq:220,duration:.18,volume:.7}]));
  sounds.boot=new Audio(makeToneSequenceWav([
    {freq:196,duration:.09,volume:.8},{freq:0,duration:.06},
    {freq:294,duration:.10,volume:.8},{freq:0,duration:.07},
    {freq:392,duration:.10,volume:.85},{freq:0,duration:.08},
    {freq:523,duration:.15,volume:.9}
  ]));
  sounds.good=new Audio(makeToneSequenceWav([
    {freq:523,duration:.12,volume:.8},{freq:0,duration:.04},
    {freq:659,duration:.12,volume:.8},{freq:0,duration:.04},
    {freq:784,duration:.22,volume:.85}
  ]));
  sounds.achievement=new Audio(makeToneSequenceWav([
    {freq:880,duration:.055,volume:.85},{freq:0,duration:.025},
    {freq:520,duration:.055,volume:.85},{freq:0,duration:.06},
    {freq:880,duration:.055,volume:.85},{freq:0,duration:.025},
    {freq:520,duration:.055,volume:.85},{freq:0,duration:.06},
    {freq:880,duration:.055,volume:.85},{freq:0,duration:.025},
    {freq:520,duration:.055,volume:.85}
  ]));
  sounds.firework=new Audio("8d82b5_Super_Mario_Bros_Fireworks_Sound_Effect.mp3");
  sounds.perfectWeek=new Audio("fever-stage-clear (online-video-cutter.com).mp3");
}

function play(name){
  if(!sounds[name]) return;
  let s=sounds[name].cloneNode();
  s.play().catch(()=>{});
}

function playGoodSeal(){ play("good"); }
function playAchievementSound(){ play("achievement"); }

function getTradingDayIndex(){
  let d=new Date().getDay();
  if(d===6) return -1;
  if(d===0) return 0;
  if(d>=1 && d<=5) return d;
  return -1;
}

function getWeekKey(){
  let now=new Date();
  let day=now.getDay();
  let diff=now.getDate()-day;
  let sunday=new Date(now.setDate(diff));
  return sunday.toISOString().slice(0,10);
}

function freshState(){
  return{
    weekKey:weekKey,
    streak:0,
    bestStreak:0,
    finalForm:null,
    statuses:["inactive","inactive","inactive","inactive","inactive","inactive"],
    sundayVows:Array(sundayVows.length).fill(false),
    weekdayVows:Array.from({length:6},()=>Array(weekdayVows.length).fill(false)),
    damage:Array.from({length:6},()=>Array(damageStates.length).fill(false))
  };
}

function loadState(){
  let saved=localStorage.getItem("kaizenKnightV5");
  if(!saved) return freshState();
  try{
    let parsed=JSON.parse(saved);
    if(parsed.weekKey!==weekKey){
      let newState=freshState();
      newState.streak=typeof parsed.streak==="number" ? parsed.streak : 0;
      newState.bestStreak=typeof parsed.bestStreak==="number" ? parsed.bestStreak : newState.streak;
      return newState;
    }
    if(!parsed.sundayVows || parsed.sundayVows.length!==sundayVows.length) return freshState();
    if(!parsed.weekdayVows || parsed.weekdayVows[1].length!==weekdayVows.length) return freshState();
    if(!parsed.damage || parsed.damage[0].length!==damageStates.length) return freshState();
    if(typeof parsed.streak!=="number") parsed.streak=cleanCountFromStatuses(parsed.statuses);
    if(typeof parsed.bestStreak!=="number") parsed.bestStreak=parsed.streak;
    if(typeof parsed.finalForm==="undefined") parsed.finalForm=null;
    return parsed;
  }catch(e){
    return freshState();
  }
}

function saveState(){
  localStorage.setItem("kaizenKnightV5",JSON.stringify(state));
}

function cleanCountFromStatuses(statuses){
  if(!statuses) return 0;
  return statuses.filter(s=>s==="complete").length;
}

function getVowStateForToday(){
  if(todayIndex===0) return state.sundayVows;
  return state.weekdayVows[todayIndex];
}

function getPetImage(type){
  if(type==="king") return "king.png";
  if(type==="rook") return "rook.png";
  if(type==="angel") return "angel.png";
  if(type==="red") return "red.png";
  if(type==="orange") return "orange.png";
  if(type==="yellow") return "yellow.png";
  if(type==="green") return "green.png";
  if(type==="blue") return "blue.png";
  if(type==="purple") return "purple.png";
  if(type==="black") return "black.png";
  if(type==="brown") return "brown.png";
  return "knight.png";
}

function isCleanSprite(type){
  return type==="angel" ||
         type==="red" ||
         type==="orange" ||
         type==="yellow" ||
         type==="green" ||
         type==="blue" ||
         type==="purple" ||
         type==="black" ||
         type==="brown";
}

function getPetClass(type){
  if(isCleanSprite(type)) return "pet-img clean-img";
  return "pet-img";
}

function streakHTML(){
  return "<div class='streak-counter'>"+state.streak+"</div>";
}

function achievementHTML(){
  return "<div class='achievement-banner' id='achievementBanner'></div>";
}

function petHTML(type="knight"){
  return `
    <div class="pet-zone">
      <div class="pet-walker left" id="petWalker">
        <div class="pet-bob">
          <img class="${getPetClass(type)}" id="petImg" src="${getPetImage(type)}" data-pet-type="${type}">
          <img class="firework-img" id="fireworkImg" src="Firework1.png">
        </div>
      </div>
    </div>
  `;
}

function stopPet(){ clearInterval(moveTimer); }

function stopFirework(){
  clearInterval(fireworkTimer);
  fireworkTimer=null;
  fireworkFrame=1;
  const fw=document.getElementById("fireworkImg");
  if(fw){
    fw.style.display="none";
    fw.src="Firework1.png";
  }
}

function startFirework(){
  stopFirework();
  const fw=document.getElementById("fireworkImg");
  if(!fw) return;
  fireworkFrame=1;
  fw.src="Firework1.png";
  fw.style.display="block";
  play("firework");
  fireworkTimer=setInterval(()=>{
    fireworkFrame++;
    if(fireworkFrame>12){
      stopFirework();
      return;
    }
    if(fireworkFrame===5 || fireworkFrame===9){
      play("firework");
    }
    fw.src="Firework"+fireworkFrame+".png";
  },500);
}

function showAchievementBanner(dayNum){
  clearTimeout(achievementTimer);
  const banner=document.getElementById("achievementBanner");
  if(!banner) return;
  banner.className="achievement-banner";
  banner.innerHTML="DAY "+dayNum+"!";
  void banner.offsetWidth;
  playAchievementSound();
  banner.classList.add("show");
  achievementTimer=setTimeout(()=>{
    banner.className="achievement-banner";
    banner.innerHTML="";
  },2100);
}

function startPet(delay=0){
  stopPet();
  setTimeout(()=>{
    const walker=document.getElementById("petWalker");
    const pet=document.getElementById("petImg");
    if(!walker || !pet) return;
    petStep=0;
    walker.style.left=petPositions[petStep]+"%";
    moveTimer=setInterval(()=>{
      const current=petPositions[petStep];
      petStep=(petStep+1)%petPositions.length;
      const next=petPositions[petStep];
      if(next>current){
        walker.className="pet-walker right";
        pet.src=getPetImage(pet.dataset.petType);
      }else if(next<current){
        walker.className="pet-walker left";
        pet.src=getPetImage(pet.dataset.petType);
      }else{
        if(pet.dataset.petType==="knight") pet.src="blink.png";
      }
      walker.style.left=next+"%";
    },1200);
  },delay);
}

function renderDays(){
  for(let i=0;i<6;i++){
    let el=document.getElementById("day"+i);
    el.className="day";
    if(state.statuses[i]==="complete") el.classList.add("complete");
    if(state.statuses[i]==="failed") el.classList.add("failed");
    if(state.statuses[i]==="inactive") el.classList.add("inactive");
    if(i===todayIndex) el.classList.add("today");
  }
}

function cleanCount(){ return state.statuses.filter(s=>s==="complete").length; }
function failedCount(){ return state.statuses.filter(s=>s==="failed").length; }
function perfectWeek(){ return cleanCount()===6 && failedCount()===0; }

function weeklyVowPercent(){
  let checked=0;
  let total=0;
  for(let i=0;i<sundayVows.length;i++){
    total++;
    if(state.sundayVows[i]) checked++;
  }
  for(let d=1;d<=5;d++){
    for(let i=0;i<weekdayVows.length;i++){
      total++;
      if(state.weekdayVows[d][i]) checked++;
    }
  }
  if(total<=0) return 0;
  return Math.floor((checked/total)*100);
}

function formFromWeeklyPercent(percent){
  if(percent>=90) return "red";
  if(percent>=80) return "orange";
  if(percent>=70) return "yellow";
  if(percent>=60) return "green";
  if(percent>=50) return "blue";
  if(percent>=40) return "purple";
  if(percent>=30) return "black";
  if(percent>=20) return "brown";
  return null;
}

function shouldShowFinalForm(){
  return state.finalForm && (todayIndex===5 || todayIndex===-1);
}

function powerOn(){
  if(poweredOn) return;
  poweredOn=true;
  play("boot");
  showBoot();
}

function showBoot(){
  renderDays();
  document.getElementById("screen").className="screen boot-dark";
  document.getElementById("statusBar").innerHTML="POWER";
  document.getElementById("playArea").innerHTML="<div class='boot-text'>BOOTING...</div>";
  setTimeout(()=>{ document.getElementById("statusBar").innerHTML="KAIZEN KNIGHT"; },650);
  setTimeout(()=>{
    document.getElementById("screen").className="screen";
    showMain(true);
  },1200);
}

function showMain(fromBoot=false){
  if(!requirePower()) return;
  stopPet();
  stopFirework();
  renderDays();
  document.getElementById("screen").className="screen";
  document.getElementById("statusBar").innerHTML="KAIZEN KNIGHT";
  let weekText="WEEK OF "+weekKey;
  let status="REST DAY";
  let petType="knight";
  if(shouldShowFinalForm()){
    petType=state.finalForm;
    status=state.finalForm==="angel" ? "PERFECT WEEK" : "WEEK FORM";
  }else if(todayIndex>=0){
    status="STEADY";
    if(state.statuses[todayIndex]==="complete"){
      status="DAY SEALED CLEAN";
      petType="king";
    }
    if(state.statuses[todayIndex]==="failed"){
      status="INTEGRITY DAMAGED";
      petType="rook";
    }
  }
  document.getElementById("playArea").innerHTML=
    achievementHTML()+
    streakHTML()+
    sceneBackgroundHTML()+
    petHTML(petType)+
    "<div class='ground'></div>"+
    "<div class='textbox'>"+
    weekText+
    "<br>STATUS: "+status+
    "<br><span class='subline'>CLEAN DAYS: "+cleanCount()+"/6</span>"+
    "</div>";
  startPet(fromBoot ? 650 : 0);
}

function showCheck(restoreScroll=null){
  if(!requirePower()) return;
  if(todayIndex<0){
    showMain();
    return;
  }
  stopPet();
  stopFirework();
  let todaysVows=getTodaysVows();
  let vowState=getVowStateForToday();
  let html="";
  html+="<div class='panel'>";
  html+="<div class='panel-title'>"+days[todayIndex]+" CHECK</div>";
  html+="<div class='scroll' id='checkScroll'>";
  html+="<div class='section-label'>VOWS</div>";
  html+="<div class='small-note'>CHECK WHAT HELD TRUE TODAY</div>";
  for(let i=0;i<todaysVows.length;i++){
    html+="<div class='rule'>";
    html+="<div class='box "+(vowState[i]?"checked":"")+"' onclick='toggleVow("+i+")'></div>";
    html+="<div>"+todaysVows[i]+"</div>";
    html+="</div>";
  }
  html+="<div class='section-label'>DAMAGE</div>";
  html+="<div class='small-note'>ONLY MARK IF CONTAINMENT BROKE</div>";
  for(let i=0;i<damageStates.length;i++){
    html+="<div class='rule'>";
    html+="<div class='box "+(state.damage[todayIndex][i]?"checked":"")+"' onclick='toggleDamage("+i+")'></div>";
    html+="<div>"+damageStates[i]+"</div>";
    html+="</div>";
  }
  html+="</div>";
  html+="<div class='panel-buttons'>";
  html+="<button class='mini-btn' onclick='lockDay()'>LOCK</button>";
  html+="<button class='mini-btn' onclick='showMain()'>BACK</button>";
  html+="</div>";
  html+="</div>";
  document.getElementById("playArea").innerHTML=html;
  if(restoreScroll!==null){
    const sc=document.getElementById("checkScroll");
    if(sc) sc.scrollTop=restoreScroll;
  }
}

function showCheckWithMenuSound(){
  if(!requirePower()) return;
  play("menu");
  showCheck();
}

function showCode(){
  if(!requirePower()) return;
  play("menu");
  stopPet();
  stopFirework();
  let html="";
  html+="<div class='panel'>";
  html+="<div class='panel-title'>FIELD CODE</div>";
  html+="<div class='scroll'>";
  for(let i=0;i<codeNotes.length;i++){
    html+="<div class='note'>"+codeNotes[i]+"</div>";
  }
  html+="</div>";
  html+="<div class='panel-buttons'>";
  html+="<button class='mini-btn' onclick='showMain()'>BACK</button>";
  html+="</div>";
  html+="</div>";
  document.getElementById("playArea").innerHTML=html;
}

function getCheckScrollTop(){
  const sc=document.getElementById("checkScroll");
  return sc ? sc.scrollTop : 0;
}

function toggleVow(i){
  if(!requirePower()) return;
  let scrollTop=getCheckScrollTop();
  let vowState=getVowStateForToday();
  vowState[i]=!vowState[i];
  saveState();
  play("tick");
  showCheck(scrollTop);
}

function toggleDamage(i){
  if(!requirePower()) return;
  let scrollTop=getCheckScrollTop();
  state.damage[todayIndex][i]=!state.damage[todayIndex][i];
  saveState();
  play("tick");
  showCheck(scrollTop);
}

function lockDay(){
  if(!requirePower()) return;
  stopPet();
  stopFirework();
  let passed=true;
  let vowState=getVowStateForToday();
  for(let i=0;i<vowState.length;i++){
    if(!vowState[i]) passed=false;
  }
  for(let i=0;i<damageStates.length;i++){
    if(state.damage[todayIndex][i]) passed=false;
  }
  state.statuses[todayIndex]=passed ? "complete" : "failed";
  let newRecord=false;
  if(passed){
    state.streak++;
    if(state.streak>state.bestStreak && state.streak<=365){
      state.bestStreak=state.streak;
      newRecord=true;
    }
  }else{
    state.streak=0;
  }
  let shouldPlayFirework=passed && todayIndex===5 && perfectWeek();
  let weeklyForm=null;
  if(todayIndex===5){
    if(shouldPlayFirework){
      weeklyForm="angel";
    }else{
      weeklyForm=formFromWeeklyPercent(weeklyVowPercent());
    }
    state.finalForm=weeklyForm;
  }
  saveState();
  if(shouldPlayFirework){
    play("perfectWeek");
  }else if(todayIndex===5 && weeklyForm){
    playGoodSeal();
  }else if(passed){
    playGoodSeal();
  }else{
    play("fail");
  }
  renderDays();
  let petType=passed ? "king" : "rook";
  if(todayIndex===5 && weeklyForm){
    petType=weeklyForm;
  }
  let sealText="DAY SEALED";
  let resultText=passed ? "INTEGRITY PRESERVED" : "INTEGRITY DAMAGED";
  if(shouldPlayFirework){
    sealText="PERFECT WEEK!";
    resultText="INTEGRITY PRESERVED";
  }else if(todayIndex===5 && weeklyForm){
    sealText="WEEK FORM";
    resultText=weeklyVowPercent()+"% VOWS KEPT";
  }
  document.getElementById("playArea").innerHTML=
    achievementHTML()+
    streakHTML()+
    sceneBackgroundHTML()+
    petHTML(petType)+
    "<div class='ground'></div>"+
    "<div class='textbox'>"+
    sealText+
    "<br>"+resultText+
    "</div>";
  startPet();
  if(shouldPlayFirework){
    setTimeout(()=>startFirework(),450);
  }
  if(newRecord){
    setTimeout(()=>showAchievementBanner(state.streak),650);
  }
}

function resetWeek(){
  if(!requirePower()) return;
  play("reset");
  stopFirework();
  let savedStreak=state.streak;
  let savedBestStreak=state.bestStreak;
  state=freshState();
  state.streak=savedStreak;
  state.bestStreak=savedBestStreak;
  saveState();
  showMain();
}

buildSounds();
renderDays();
</script>
</body>
</html>
